<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="300" fill="#f8f9fa" rx="8"/>

  <!-- Client box -->
  <rect x="40" y="110" width="120" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
  <text x="100" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Client</text>
  <text x="100" y="163" text-anchor="middle" font-size="11" fill="#555">Application</text>

  <!-- Arrow client → gateway -->
  <line x1="160" y1="150" x2="240" y2="150" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="143" text-anchor="middle" font-size="10" fill="#555">HTTPS</text>

  <!-- Gateway box -->
  <rect x="240" y="90" width="160" height="120" fill="#fff3e0" stroke="#f57c00" stroke-width="2" rx="6"/>
  <text x="320" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Nexus Gateway</text>
  <text x="320" y="147" text-anchor="middle" font-size="10" fill="#555">Auth · Rate Limit</text>
  <text x="320" y="163" text-anchor="middle" font-size="10" fill="#555">Routing · Transform</text>
  <text x="320" y="179" text-anchor="middle" font-size="10" fill="#555">Observability</text>

  <!-- Arrow gateway → services -->
  <line x1="400" y1="130" x2="480" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="150" x2="480" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="170" x2="480" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Service A -->
  <rect x="480" y="60" width="130" height="60" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="6"/>
  <text x="545" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Orders Service</text>
  <text x="545" y="104" text-anchor="middle" font-size="10" fill="#555">:8080</text>

  <!-- Service B -->
  <rect x="480" y="120" width="130" height="60" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="6"/>
  <text x="545" y="147" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Products Service</text>
  <text x="545" y="164" text-anchor="middle" font-size="10" fill="#555">:8081</text>

  <!-- Service C -->
  <rect x="480" y="180" width="130" height="60" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="6"/>
  <text x="545" y="207" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Auth Service</text>
  <text x="545" y="224" text-anchor="middle" font-size="10" fill="#555">:8082</text>

  <!-- Caption -->
  <text x="400" y="278" text-anchor="middle" font-size="11" fill="#888" font-style="italic">
    Nexus Gateway routes client traffic to backend microservices
  </text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

</svg>
